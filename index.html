<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>日文聽寫練習與單字庫系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            keyframes: {
              shake: {
                "0%, 100%": { transform: "translateX(0)" },
                "20%": { transform: "translateX(-8px)" },
                "40%": { transform: "translateX(8px)" },
                "60%": { transform: "translateX(-5px)" },
                "80%": { transform: "translateX(5px)" }
              },
              pop: {
                "0%": { opacity: "0", transform: "scale(0.9)" },
                "100%": { opacity: "1", transform: "scale(1)" }
              },
              fadeInUp: {
                "0%": { opacity: "0", transform: "translateY(12px)" },
                "100%": { opacity: "1", transform: "translateY(0)" }
              },
              pulseHint: {
                "0%, 100%": { opacity: "1", transform: "scale(1)" },
                "50%": { opacity: "0.42", transform: "scale(0.95)" }
              }
            },
            animation: {
              shake: "shake 0.34s ease-in-out",
              pop: "pop 0.22s ease-out",
              fadeInUp: "fadeInUp 0.2s ease-out",
              pulseHint: "pulseHint 0.7s ease-in-out 2"
            }
          }
        }
      };
    </script>
    <style>
      body {
        -webkit-tap-highlight-color: transparent;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body class="bg-slate-100 text-slate-800">
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      const STORAGE_KEY = "jp_dictation_progress_v4";
      const PRACTICE_MODE_IDS = ["all", "mistakes", "favorites"];

      const TOP_TABS = [
        { id: "all", label: "綜合練習" },
        { id: "mistakes", label: "錯題特訓" },
        { id: "favorites", label: "重點收藏" },
        { id: "overview", label: "單字總覽" }
      ];

      const KEYBOARD_TABS = [
        { id: "gojuon", label: "清音" },
        { id: "dakuten", label: "濁音/半濁音" },
        { id: "special", label: "特殊音" }
      ];

      const VOCABULARY = [
        { id: 1, kanji: "物価", kana: "ぶっか", chinese: "物價" },
        { id: 2, kanji: "切符", kana: "きっぷ", chinese: "車票" },
        { id: 3, kanji: "切手", kana: "きって", chinese: "郵票" },
        { id: 4, kanji: "一杯", kana: "いっぱい", chinese: "一杯 / 滿滿的" },
        { id: 5, kanji: "両親", kana: "りょうしん", chinese: "雙親 / 父母" },
        { id: 6, kanji: "結婚", kana: "けっこん", chinese: "結婚" },
        { id: 7, kanji: "雑誌", kana: "ざっし", chinese: "雜誌" },
        { id: 8, kanji: "作業", kana: "さぎょう", chinese: "作業 / 工作" },
        { id: 9, kanji: "病院", kana: "びょういん", chinese: "醫院" },
        { id: 10, kanji: "郵便局", kana: "ゆうびんきょく", chinese: "郵局" },
        { id: 11, kanji: "竜眼", kana: "りゅうがん", chinese: "龍眼" },
        { id: 12, kanji: "料理", kana: "りょうり", chinese: "料理" },
        { id: 13, kanji: "東京", kana: "とうきょう", chinese: "東京" },
        { id: 14, kanji: "京都", kana: "きょうと", chinese: "京都" },
        { id: 15, kanji: "投票", kana: "とうひょう", chinese: "投票" },
        { id: 16, kanji: "省略", kana: "しょうりゃく", chinese: "省略" },
        { id: 17, kanji: "百円", kana: "ひゃくえん", chinese: "百元" },
        { id: 18, kanji: "山脈", kana: "さんみゃく", chinese: "山脈" },
        { id: 19, kanji: "明朝", kana: "みょうちょう", chinese: "明早" },
        { id: 20, kanji: "蒟蒻", kana: "こんにゃく", chinese: "蒟蒻" },
        { id: 21, kanji: "牛乳", kana: "ぎゅうにゅう", chinese: "牛奶" },
        { id: 22, kanji: "女房", kana: "にょうぼう", chinese: "妻子 / 老婆" },
        { id: 23, kanji: "中国人", kana: "ちゅうごくじん", chinese: "中國人" },
        { id: 24, kanji: "蝶々", kana: "ちょうちょう", chinese: "蝴蝶" },
        { id: 25, kanji: "中学生", kana: "ちゅうがくせい", chinese: "國中生" },
        { id: 26, kanji: "到着", kana: "とうちゃく", chinese: "抵達" },
        { id: 27, kanji: "離陸", kana: "りりく", chinese: "起飛" },
        { id: 28, kanji: "写真集", kana: "しゃしんしゅう", chinese: "寫真集" },
        { id: 29, kanji: "小学生", kana: "しょうがくせい", chinese: "小學生" },
        { id: 30, kanji: "お客さん", kana: "おきゃくさん", chinese: "客人" },
        { id: 31, kanji: "胡瓜", kana: "きゅうり", chinese: "小黃瓜" },
        { id: 32, kanji: "今日", kana: "きょう", chinese: "今天" },
        { id: 33, kanji: "明日", kana: "あした", chinese: "明天" },
        { id: 34, kanji: "昨日", kana: "きのう", chinese: "昨天" }
      ];

      const GOJUON_PANEL = [
        ["あ", "い", "う", "え", "お"],
        ["か", "き", "く", "け", "こ"],
        ["さ", "し", "す", "せ", "そ"],
        ["た", "ち", "つ", "て", "と"],
        ["な", "に", "ぬ", "ね", "の"],
        ["は", "ひ", "ふ", "へ", "ほ"],
        ["ま", "み", "む", "め", "も"],
        ["や", "", "ゆ", "", "よ"],
        ["ら", "り", "る", "れ", "ろ"],
        ["わ", "", "", "を", "ん"]
      ];

      const DAKUTEN_PANEL = [
        ["が", "ぎ", "ぐ", "げ", "ご"],
        ["ざ", "じ", "ず", "ぜ", "ぞ"],
        ["だ", "ぢ", "づ", "で", "ど"],
        ["ば", "び", "ぶ", "べ", "ぼ"],
        ["ぱ", "ぴ", "ぷ", "ぺ", "ぽ"]
      ];

      const SPECIAL_PANEL = ["ゃ", "ゅ", "ょ", "っ", "ー", "う", "い"];

      function shuffleIds(ids) {
        const arr = [...ids];
        for (let i = arr.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function normalizeUniqueIds(input) {
        if (!Array.isArray(input)) return [];
        const valid = [];
        for (let i = 0; i < input.length; i += 1) {
          const n = Number(input[i]);
          if (Number.isInteger(n) && n >= 1 && n <= 34) valid.push(n);
        }
        return Array.from(new Set(valid));
      }

      function encodeProgress(progress) {
        return btoa(unescape(encodeURIComponent(JSON.stringify(progress))));
      }

      function decodeProgress(raw) {
        const text = String(raw || "").trim();
        if (!text) throw new Error("內容為空白。");
        let parsed;
        try {
          parsed = JSON.parse(text);
        } catch {
          parsed = JSON.parse(decodeURIComponent(escape(atob(text))));
        }
        return {
          mistakes: normalizeUniqueIds(parsed.mistakes),
          favorites: normalizeUniqueIds(parsed.favorites)
        };
      }

      function getPool(modeId, mistakes, favorites) {
        if (modeId === "mistakes") return normalizeUniqueIds(mistakes);
        if (modeId === "favorites") return normalizeUniqueIds(favorites);
        return VOCABULARY.map((w) => w.id);
      }

      function createSessionState(poolIds, vocabMap) {
        if (!poolIds.length) {
          return {
            queue: [],
            queueIndex: 0,
            currentId: null,
            inputChars: [],
            wrongIndexes: [],
            locked: false,
            gaveUp: false,
            shake: false,
            statusText: "",
            showResultOverlay: false,
            showRemoveMistakePrompt: false,
            usedHintOnCurrent: false,
            hintIndexes: [],
            roundDone: false,
            result: {
              total: 0,
              correct: 0,
              wrongSet: [],
              finished: false
            }
          };
        }
        const queue = shuffleIds(poolIds);
        const currentId = queue[0];
        const word = vocabMap.get(currentId);
        return {
          queue,
          queueIndex: 0,
          currentId,
          inputChars: Array.from(word.kana).map(() => ""),
          wrongIndexes: [],
          locked: false,
          gaveUp: false,
          shake: false,
          statusText: "",
          showResultOverlay: false,
          showRemoveMistakePrompt: false,
          usedHintOnCurrent: false,
          hintIndexes: [],
          roundDone: false,
          result: {
            total: queue.length,
            correct: 0,
            wrongSet: [],
            finished: false
          }
        };
      }

      function App() {
        const [mode, setMode] = useState("all");
        const [keyboardMode, setKeyboardMode] = useState("gojuon");
        const [autoPlay, setAutoPlay] = useState(true);
        const [mistakes, setMistakes] = useState([]);
        const [favorites, setFavorites] = useState([]);
        const [modeStates, setModeStates] = useState({
          all: createSessionState([], new Map()),
          mistakes: createSessionState([], new Map()),
          favorites: createSessionState([], new Map())
        });
        const [toast, setToast] = useState({ visible: false, text: "" });
        const [isSpeaking, setIsSpeaking] = useState(false);
        const [settingsOpen, setSettingsOpen] = useState(false);
        const [transferText, setTransferText] = useState("");
        const [exportText, setExportText] = useState("");
        const [settingsMessage, setSettingsMessage] = useState("");
        const [ready, setReady] = useState(false);

        const toastTimerRef = useRef(null);
        const modeNextTimerRef = useRef({ all: null, mistakes: null, favorites: null });
        const hintClearTimerRef = useRef({ all: null, mistakes: null, favorites: null });
        const prevCurrentIdRef = useRef({ all: null, mistakes: null, favorites: null });

        const vocabMap = useMemo(() => {
          const map = new Map();
          for (let i = 0; i < VOCABULARY.length; i += 1) map.set(VOCABULARY[i].id, VOCABULARY[i]);
          return map;
        }, []);

        const activePracticeMode = mode === "overview" ? null : mode;
        const activeState = activePracticeMode ? modeStates[activePracticeMode] : null;
        const activeCurrent = activeState && activeState.currentId ? vocabMap.get(activeState.currentId) : null;
        const activeAnswerChars = useMemo(
          () => (activeCurrent ? Array.from(activeCurrent.kana) : []),
          [activeCurrent]
        );
        const activeFirstEmpty = activeState ? activeState.inputChars.findIndex((x) => x === "") : -1;

        useEffect(() => {
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
              const parsed = JSON.parse(raw);
              setMistakes(normalizeUniqueIds(parsed.mistakes));
              setFavorites(normalizeUniqueIds(parsed.favorites));
            }
          } catch {
            setMistakes([]);
            setFavorites([]);
          } finally {
            setReady(true);
          }
        }, []);

        useEffect(() => {
          if (!ready) return;
          localStorage.setItem(
            STORAGE_KEY,
            JSON.stringify({
              mistakes: normalizeUniqueIds(mistakes),
              favorites: normalizeUniqueIds(favorites)
            })
          );
        }, [mistakes, favorites, ready]);

        useEffect(() => {
          if (!ready) return;
          setModeStates((prev) => {
            const next = { ...prev };
            for (let i = 0; i < PRACTICE_MODE_IDS.length; i += 1) {
              const modeId = PRACTICE_MODE_IDS[i];
              const oldState = prev[modeId];
              const pool = getPool(modeId, mistakes, favorites);
              const poolSet = new Set(pool);

              if (oldState.roundDone) {
                const filteredWrong = oldState.result.wrongSet.filter((id) => poolSet.has(id));
                const correctedResult = {
                  ...oldState.result,
                  total: pool.length,
                  wrongSet: filteredWrong
                };
                next[modeId] = { ...oldState, result: correctedResult };
                continue;
              }

              if (!oldState.queue.length && pool.length) {
                next[modeId] = createSessionState(pool, vocabMap);
                continue;
              }

              if (!pool.length) {
                next[modeId] = createSessionState([], vocabMap);
                continue;
              }

              const filteredQueue = oldState.queue.filter((id) => poolSet.has(id));
              if (!filteredQueue.length) {
                next[modeId] = createSessionState(pool, vocabMap);
                continue;
              }

              let currentId = oldState.currentId;
              if (!currentId || !poolSet.has(currentId)) currentId = filteredQueue[0];
              const queueIndex = filteredQueue.indexOf(currentId);
              const word = vocabMap.get(currentId);
              const answerLen = Array.from(word.kana).length;
              const questionChanged = currentId !== oldState.currentId;

              next[modeId] = {
                ...oldState,
                queue: filteredQueue,
                queueIndex,
                currentId,
                inputChars:
                  questionChanged || oldState.inputChars.length !== answerLen
                    ? Array(answerLen).fill("")
                    : oldState.inputChars,
                wrongIndexes: questionChanged ? [] : oldState.wrongIndexes,
                locked: questionChanged ? false : oldState.locked,
                gaveUp: questionChanged ? false : oldState.gaveUp,
                shake: questionChanged ? false : oldState.shake,
                statusText: questionChanged ? "" : oldState.statusText,
                showResultOverlay: questionChanged ? false : oldState.showResultOverlay,
                showRemoveMistakePrompt: questionChanged ? false : oldState.showRemoveMistakePrompt,
                usedHintOnCurrent: questionChanged ? false : oldState.usedHintOnCurrent,
                hintIndexes: questionChanged ? [] : oldState.hintIndexes,
                result: {
                  ...oldState.result,
                  total: filteredQueue.length,
                  wrongSet: oldState.result.wrongSet.filter((id) => poolSet.has(id))
                }
              };
            }
            return next;
          });
        }, [mistakes, favorites, ready, vocabMap]);

        useEffect(() => {
          if (!activePracticeMode) return;
          const state = modeStates[activePracticeMode];
          if (!state || !state.currentId || state.roundDone) return;
          const prevId = prevCurrentIdRef.current[activePracticeMode];
          if (prevId !== state.currentId) {
            prevCurrentIdRef.current[activePracticeMode] = state.currentId;
            if (autoPlay) {
              setTimeout(() => {
                const word = vocabMap.get(state.currentId);
                if (word) speakKana(word.kana);
              }, 160);
            }
          }
        }, [activePracticeMode, modeStates, autoPlay, vocabMap]);

        useEffect(() => {
          function onKeyDown(event) {
            if (event.key !== "Backspace") return;
            if (!activePracticeMode) return;
            if (!activeState || activeState.roundDone || activeState.gaveUp) return;
            event.preventDefault();
            backspace();
          }
          window.addEventListener("keydown", onKeyDown);
          return () => window.removeEventListener("keydown", onKeyDown);
        }, [activePracticeMode, activeState]);

        useEffect(() => {
          return () => {
            if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
            for (let i = 0; i < PRACTICE_MODE_IDS.length; i += 1) {
              const id = PRACTICE_MODE_IDS[i];
              if (modeNextTimerRef.current[id]) clearTimeout(modeNextTimerRef.current[id]);
              if (hintClearTimerRef.current[id]) clearTimeout(hintClearTimerRef.current[id]);
            }
            window.speechSynthesis.cancel();
          };
        }, []);

        function setStateForMode(modeId, updater) {
          setModeStates((prev) => ({ ...prev, [modeId]: updater(prev[modeId]) }));
        }

        function triggerToast(text) {
          if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
          setToast({ visible: true, text });
          toastTimerRef.current = setTimeout(() => {
            setToast({ visible: false, text: "" });
          }, 1450);
        }

        function speakKana(kana) {
          if (!("speechSynthesis" in window)) {
            triggerToast("此瀏覽器不支援語音播放。");
            return;
          }
          window.speechSynthesis.cancel();
          const utter = new SpeechSynthesisUtterance(kana);
          utter.lang = "ja-JP";
          utter.rate = 0.9;
          utter.pitch = 1.0;
          utter.onstart = () => setIsSpeaking(true);
          utter.onend = () => setIsSpeaking(false);
          utter.onerror = () => {
            setIsSpeaking(false);
            triggerToast("播放失敗，請稍後再試。");
          };
          window.speechSynthesis.speak(utter);
        }

        function addMistakeOnce(id) {
          setMistakes((prev) => {
            if (prev.includes(id)) return prev;
            triggerToast("已加入錯題本");
            return [...prev, id];
          });
        }

        function toggleFavorite(id) {
          setFavorites((prev) => {
            if (prev.includes(id)) {
              triggerToast("已取消收藏");
              return prev.filter((x) => x !== id);
            }
            triggerToast("已加入收藏");
            return [...prev, id];
          });
        }

        function gotoNextQuestionOrFinish(modeId) {
          setStateForMode(modeId, (old) => {
            if (!old.queue.length) return old;
            const nextIndex = old.queueIndex + 1;
            if (nextIndex >= old.queue.length) {
              return {
                ...old,
                roundDone: true,
                showResultOverlay: false,
                showRemoveMistakePrompt: false,
                result: {
                  ...old.result,
                  finished: true
                }
              };
            }
            const nextId = old.queue[nextIndex];
            const word = vocabMap.get(nextId);
            return {
              ...old,
              queueIndex: nextIndex,
              currentId: nextId,
              inputChars: Array.from(word.kana).map(() => ""),
              wrongIndexes: [],
              locked: false,
              gaveUp: false,
              shake: false,
              statusText: "",
              showResultOverlay: false,
              showRemoveMistakePrompt: false,
              usedHintOnCurrent: false,
              hintIndexes: []
            };
          });
        }

        function applyWrongAndMark(modeId, state, wrongIndexes, message) {
          addMistakeOnce(state.currentId);
          const wrongSet = state.result.wrongSet.includes(state.currentId)
            ? state.result.wrongSet
            : [...state.result.wrongSet, state.currentId];
          return {
            ...state,
            wrongIndexes,
            statusText: message,
            shake: true,
            result: {
              ...state.result,
              wrongSet
            }
          };
        }

        function finalizeCorrect(modeId, state, answerInput) {
          if (modeNextTimerRef.current[modeId]) clearTimeout(modeNextTimerRef.current[modeId]);
          modeNextTimerRef.current[modeId] = setTimeout(() => {
            gotoNextQuestionOrFinish(modeId);
          }, 1500);

          return {
            ...state,
            inputChars: answerInput,
            wrongIndexes: [],
            locked: true,
            statusText: "答對！",
            showResultOverlay: true,
            showRemoveMistakePrompt: modeId === "mistakes" && mistakes.includes(state.currentId),
            result: {
              ...state.result,
              correct: state.result.correct + 1
            }
          };
        }

        function inputKana(ch) {
          if (!activePracticeMode || !activeCurrent || !activeState || activeState.locked || activeState.roundDone) return;
          const modeId = activePracticeMode;
          const answer = Array.from(activeCurrent.kana);

          setStateForMode(modeId, (old) => {
            const idx = old.inputChars.findIndex((x) => x === "");
            if (idx === -1) return old;
            const nextInput = [...old.inputChars];
            nextInput[idx] = ch;

            if (nextInput.some((x) => x === "")) {
              return {
                ...old,
                inputChars: nextInput,
                wrongIndexes: [],
                statusText: ""
              };
            }

            const wrong = [];
            for (let i = 0; i < answer.length; i += 1) {
              if (nextInput[i] !== answer[i]) wrong.push(i);
            }

            // 修正：當全填完時，檢查這題是否曾經錯過，或是否用過提示
            if (wrong.length === 0) {
              const hasMistake = old.result.wrongSet.includes(old.currentId);
              
              if (!hasMistake && !old.usedHintOnCurrent) {
                return finalizeCorrect(modeId, old, nextInput);
              } else {
                // 如果曾經答錯過或用過提示，就算補對了也不能算是「全對」，而是標記完成並列入錯題
                if (modeNextTimerRef.current[modeId]) clearTimeout(modeNextTimerRef.current[modeId]);
                modeNextTimerRef.current[modeId] = setTimeout(() => {
                  gotoNextQuestionOrFinish(modeId);
                }, 1500);

                return {
                  ...old,
                  inputChars: nextInput,
                  wrongIndexes: [],
                  locked: true,
                  statusText: "完成！(曾答錯或使用提示，已列入錯題)",
                  showRemoveMistakePrompt: false
                };
              }
            }

            return applyWrongAndMark(modeId, { ...old, inputChars: nextInput }, wrong, "有錯字，請手動刪除錯誤字元後重填。");
          });

          setTimeout(() => {
            setStateForMode(modeId, (old) => ({ ...old, shake: false }));
          }, 360);
        }

        function backspace() {
          if (!activePracticeMode || !activeState || !activeCurrent || activeState.locked || activeState.roundDone) return;
          const modeId = activePracticeMode;
          setStateForMode(modeId, (old) => {
            let idx = -1;
            for (let i = old.inputChars.length - 1; i >= 0; i -= 1) {
              if (old.inputChars[i] !== "") {
                idx = i;
                break;
              }
            }
            if (idx === -1) return old;
            const next = [...old.inputChars];
            next[idx] = "";
            return {
              ...old,
              inputChars: next,
              wrongIndexes: [],
              statusText: ""
            };
          });
        }

        function clearAll() {
          if (!activePracticeMode || !activeState || !activeCurrent || activeState.locked || activeState.roundDone) return;
          const modeId = activePracticeMode;
          setStateForMode(modeId, (old) => ({
            ...old,
            inputChars: Array(old.inputChars.length).fill(""),
            wrongIndexes: [],
            statusText: ""
          }));
        }

        function useHint() {
          if (!activePracticeMode || !activeCurrent || !activeState || activeState.locked || activeState.roundDone) return;
          const modeId = activePracticeMode;
          const answer = Array.from(activeCurrent.kana);
          const firstEmpty = activeState.inputChars.findIndex((x) => x === "");
          if (firstEmpty === -1) return;

          addMistakeOnce(activeState.currentId);
          setStateForMode(modeId, (old) => {
            // 修正：移除了防止多次點擊提示的限制，現在可以一直按提示了
            const wrongSet = old.result.wrongSet.includes(old.currentId)
              ? old.result.wrongSet
              : [...old.result.wrongSet, old.currentId];
            return {
              ...old,
              usedHintOnCurrent: true,
              hintIndexes: [firstEmpty],
              statusText: `提示：第 ${firstEmpty + 1} 格是「${answer[firstEmpty]}」，此題已判定為錯題。`,
              result: {
                ...old.result,
                wrongSet
              }
            };
          });
          triggerToast("已加入錯題本");

          if (hintClearTimerRef.current[modeId]) clearTimeout(hintClearTimerRef.current[modeId]);
          hintClearTimerRef.current[modeId] = setTimeout(() => {
            setStateForMode(modeId, (old) => ({ ...old, hintIndexes: [] }));
          }, 1200);
        }

        function giveUp() {
          if (!activePracticeMode || !activeCurrent || !activeState || activeState.locked || activeState.roundDone) return;
          const modeId = activePracticeMode;
          const answer = Array.from(activeCurrent.kana);

          addMistakeOnce(activeState.currentId);
          setStateForMode(modeId, (old) => {
            const wrongSet = old.result.wrongSet.includes(old.currentId)
              ? old.result.wrongSet
              : [...old.result.wrongSet, old.currentId];
            return {
              ...old,
              inputChars: answer,
              wrongIndexes: [],
              locked: true,
              gaveUp: true,
              statusText: "已放棄，顯示正確答案。請按「下一題」繼續。",
              result: {
                ...old.result,
                wrongSet
              }
            };
          });
        }

        function reshuffleMode(modeId) {
          if (modeNextTimerRef.current[modeId]) clearTimeout(modeNextTimerRef.current[modeId]);
          if (hintClearTimerRef.current[modeId]) clearTimeout(hintClearTimerRef.current[modeId]);
          const pool = getPool(modeId, mistakes, favorites);
          setStateForMode(modeId, () => createSessionState(pool, vocabMap));
          if (modeId === mode) triggerToast("已重新洗牌");
        }

        function removeFromMistakeBook(id) {
          setMistakes((prev) => prev.filter((x) => x !== id));
          if (activePracticeMode === "mistakes") {
            setStateForMode("mistakes", (old) => ({ ...old, showRemoveMistakePrompt: false }));
          }
          triggerToast("已移出錯題本");
        }

        function openSettings() {
          const progress = { mistakes: normalizeUniqueIds(mistakes), favorites: normalizeUniqueIds(favorites) };
          const encoded = encodeProgress(progress);
          setExportText(encoded);
          setTransferText(encoded);
          setSettingsMessage("");
          setSettingsOpen(true);
        }

        function refreshExportString() {
          const progress = { mistakes: normalizeUniqueIds(mistakes), favorites: normalizeUniqueIds(favorites) };
          const encoded = encodeProgress(progress);
          setExportText(encoded);
          setTransferText(encoded);
          setSettingsMessage("已重新產生最新備份字串。");
        }

        function importProgress() {
          try {
            const decoded = decodeProgress(transferText);
            setMistakes(decoded.mistakes);
            setFavorites(decoded.favorites);
            setSettingsMessage("匯入成功，進度已更新。");
            setExportText(encodeProgress(decoded));
            triggerToast("匯入完成");
          } catch (err) {
            setSettingsMessage(`匯入失敗：${err.message}`);
          }
        }

        function clearAllRecords() {
          setMistakes([]);
          setFavorites([]);
          setModeStates({
            all: createSessionState(getPool("all", [], []), vocabMap),
            mistakes: createSessionState([], vocabMap),
            favorites: createSessionState([], vocabMap)
          });
          setSettingsMessage("已清空所有紀錄。");
          triggerToast("已清空所有紀錄");
        }

        function keyboardRows(rows, specialColor) {
          return rows.map((row, rowIdx) => (
            <div key={`row-${rowIdx}`} className="grid grid-cols-5 gap-2">
              {row.map((ch, colIdx) => {
                if (!ch) return <div key={`empty-${rowIdx}-${colIdx}`} className="min-h-[44px]" />;
                return (
                  <button
                    key={ch}
                    type="button"
                    onClick={() => inputKana(ch)}
                    className={[
                      "min-h-[44px] rounded-lg border text-[24px] font-medium leading-none shadow-sm transition",
                      "focus:outline-none focus:ring-2 focus:ring-blue-300 active:scale-95",
                      specialColor
                        ? "border-amber-300 bg-amber-100 text-amber-900 hover:bg-amber-200"
                        : "border-slate-300 bg-white text-slate-800 hover:bg-slate-50"
                    ].join(" ")}
                  >
                    {ch}
                  </button>
                );
              })}
            </div>
          ));
        }

        function renderKeyboardPanel() {
          if (keyboardMode === "gojuon") return <div className="space-y-2">{keyboardRows(GOJUON_PANEL, false)}</div>;
          if (keyboardMode === "dakuten") return <div className="space-y-2">{keyboardRows(DAKUTEN_PANEL, false)}</div>;
          return (
            <div className="grid grid-cols-4 gap-2 sm:grid-cols-7">
              {SPECIAL_PANEL.map((ch) => (
                <button
                  key={ch}
                  type="button"
                  onClick={() => inputKana(ch)}
                  className="min-h-[44px] rounded-lg border border-cyan-300 bg-cyan-100 text-[24px] font-semibold text-cyan-900 shadow-sm transition hover:bg-cyan-200 focus:outline-none focus:ring-2 focus:ring-cyan-300 active:scale-95"
                >
                  {ch}
                </button>
              ))}
            </div>
          );
        }

        const modeCountText =
          mode === "all"
            ? `題庫 ${VOCABULARY.length} 題`
            : mode === "mistakes"
            ? `錯題 ${mistakes.length} 題`
            : mode === "favorites"
            ? `收藏 ${favorites.length} 題`
            : `總覽 ${VOCABULARY.length} 題`;

        const progressRatio =
          activeState && activeState.queue.length
            ? Math.round(((activeState.queueIndex + 1) / activeState.queue.length) * 100)
            : 0;

        const activeWrongKanjiList =
          activeState && activeState.result && activeState.result.wrongSet.length
            ? activeState.result.wrongSet
                .map((id) => vocabMap.get(id))
                .filter(Boolean)
                .map((w) => w.kanji)
            : [];

        const activeCorrectRate =
          activeState && activeState.result && activeState.result.total > 0
            ? Math.round((activeState.result.correct / activeState.result.total) * 100)
            : 0;

        return (
          <div className="min-h-screen px-3 py-4 sm:px-4 sm:py-6">
            <div className="mx-auto w-full max-w-2xl space-y-4">
              <section className="rounded-2xl border border-slate-200 bg-white p-3 shadow-sm sm:p-4">
                <div className="mb-2 flex items-center justify-between gap-2">
                  <h1 className="text-base font-bold sm:text-lg">日文聽寫練習與單字庫系統</h1>
                  <button
                    type="button"
                    onClick={openSettings}
                    className="min-h-[40px] min-w-[40px] rounded-lg border border-slate-300 bg-slate-100 px-2 text-lg transition hover:bg-slate-200"
                    aria-label="開啟設定"
                  >
                    ⚙️
                  </button>
                </div>

                <div className="hide-scrollbar -mx-1 overflow-x-auto px-1">
                  <div className="flex min-w-max gap-2">
                    {TOP_TABS.map((tab) => (
                      <button
                        key={tab.id}
                        type="button"
                        onClick={() => setMode(tab.id)}
                        className={[
                          "min-h-[44px] whitespace-nowrap rounded-lg border px-4 py-2 text-sm font-semibold transition",
                          mode === tab.id
                            ? "border-blue-400 bg-blue-100 text-blue-900"
                            : "border-slate-300 bg-slate-100 text-slate-700 hover:bg-slate-200"
                        ].join(" ")}
                      >
                        {tab.label}
                      </button>
                    ))}
                  </div>
                </div>

                <p className="mt-2 text-center text-xs text-slate-500 sm:text-sm">{modeCountText}</p>
              </section>

              <section className={mode === "overview" ? "rounded-2xl border border-slate-200 bg-white p-3 shadow-sm sm:p-4" : "hidden"}>
                <div className="space-y-2">
                  {VOCABULARY.map((word) => (
                    <div key={word.id} className="rounded-xl border border-slate-200 bg-slate-50 p-3">
                      <div className="flex items-start justify-between gap-2">
                        <div>
                          <p className="text-2xl font-bold text-slate-800">{word.kanji}</p>
                          <p className="text-lg text-slate-600">{word.kana}</p>
                          <p className="text-sm text-slate-500">{word.chinese}</p>
                        </div>
                        <div className="flex gap-2">
                          <button
                            type="button"
                            onClick={() => speakKana(word.kana)}
                            className="min-h-[44px] rounded-lg border border-emerald-300 bg-emerald-100 px-3 py-2 text-sm font-semibold text-emerald-800 hover:bg-emerald-200"
                          >
                            🔊
                          </button>
                          <button
                            type="button"
                            onClick={() => toggleFavorite(word.id)}
                            className={[
                              "min-h-[44px] rounded-lg border px-3 py-2 text-sm font-semibold transition",
                              favorites.includes(word.id)
                                ? "border-amber-400 bg-amber-100 text-amber-800 hover:bg-amber-200"
                                : "border-slate-300 bg-white text-slate-700 hover:bg-slate-100"
                            ].join(" ")}
                          >
                            {favorites.includes(word.id) ? "⭐" : "☆"}
                          </button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </section>

              <div className={mode === "overview" ? "hidden" : "space-y-4"}>
                <section className="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm sm:p-5">
                  <div className="mb-2 flex items-center justify-between gap-2">
                    <h2 className="text-lg font-bold sm:text-xl">聽寫練習</h2>
                    <span className="text-xs text-slate-500 sm:text-sm">
                      {activeState && activeState.queue.length > 0
                        ? `第 ${activeState.queueIndex + 1} / ${activeState.queue.length} 題`
                        : "無可練習題目"}
                    </span>
                  </div>

                  <div className="mb-3">
                    <div className="h-2 w-full rounded-full bg-slate-200">
                      <div className="h-2 rounded-full bg-blue-500 transition-all" style={{ width: `${progressRatio}%` }} />
                    </div>
                  </div>

                  <div className="mb-2 flex flex-wrap gap-2">
                    <button
                      type="button"
                      onClick={() => activePracticeMode && reshuffleMode(activePracticeMode)}
                      className="min-h-[44px] rounded-lg border border-blue-300 bg-blue-100 px-3 py-2 text-sm font-semibold text-blue-900 hover:bg-blue-200"
                    >
                      🔄 重新洗牌
                    </button>
                    <button
                      type="button"
                      onClick={useHint}
                      disabled={activeState?.gaveUp || activeState?.locked}
                      className="min-h-[44px] rounded-lg border border-violet-300 bg-violet-100 px-3 py-2 text-sm font-semibold text-violet-900 hover:bg-violet-200 disabled:opacity-50"
                    >
                      💡 提示
                    </button>
                    <button
                      type="button"
                      onClick={giveUp}
                      disabled={activeState?.gaveUp || activeState?.locked}
                      className="min-h-[44px] rounded-lg border border-rose-300 bg-rose-100 px-3 py-2 text-sm font-semibold text-rose-900 hover:bg-rose-200 disabled:opacity-50 transition"
                    >
                      🏳️ 放棄
                    </button>
                  </div>

                  {mode === "mistakes" && (!activeState || activeState.queue.length === 0) && (
                    <div className="rounded-lg border border-emerald-300 bg-emerald-50 p-4 text-center text-emerald-700">
                      目前無錯題，太棒了！
                    </div>
                  )}

                  {mode === "favorites" && (!activeState || activeState.queue.length === 0) && (
                    <div className="rounded-lg border border-amber-300 bg-amber-50 p-4 text-center text-amber-700">
                      目前無收藏題目，先在其他模式加星吧！
                    </div>
                  )}

                  {activeState && activeState.roundDone && (
                    <div className="animate-fadeInUp rounded-xl border border-slate-200 bg-slate-50 p-4">
                      <h3 className="text-xl font-bold text-slate-800">本回合結算</h3>
                      <p className="mt-1 text-sm text-slate-600">答對率：{activeCorrectRate}%</p>
                      <p className="text-sm text-slate-600">
                        答對 {activeState.result.correct} / {activeState.result.total}
                      </p>
                      <div className="mt-3 rounded-lg border border-amber-200 bg-amber-50 p-3">
                        <p className="mb-1 text-sm font-semibold text-amber-900">本次錯題漢字一覽</p>
                        <p className="text-sm text-amber-800">
                          {activeWrongKanjiList.length > 0 ? activeWrongKanjiList.join("、") : "本回合全對，表現很棒！"}
                        </p>
                      </div>
                      <button
                        type="button"
                        onClick={() => activePracticeMode && reshuffleMode(activePracticeMode)}
                        className="mt-4 min-h-[54px] w-full rounded-xl border border-blue-400 bg-blue-100 px-4 py-3 text-lg font-bold text-blue-900 hover:bg-blue-200"
                      >
                        🔄 重新洗牌測驗
                      </button>
                    </div>
                  )}

                  {activeCurrent && activeState && !activeState.roundDone && (
                    <>
                      <div className="mt-2 flex flex-wrap items-center gap-2">
                        <button
                          type="button"
                          onClick={() => speakKana(activeCurrent.kana)}
                          className={[
                            "min-h-[44px] rounded-lg border px-4 py-2 text-sm font-semibold transition",
                            isSpeaking
                              ? "border-emerald-500 bg-emerald-50 text-emerald-700"
                              : "border-emerald-300 bg-emerald-100 text-emerald-800 hover:bg-emerald-200"
                          ].join(" ")}
                        >
                          🔊 播放發音
                        </button>
                        <button
                          type="button"
                          onClick={() => setAutoPlay((v) => !v)}
                          className={[
                            "min-h-[44px] rounded-lg border px-3 py-2 text-sm font-semibold transition",
                            autoPlay
                              ? "border-blue-300 bg-blue-100 text-blue-800 hover:bg-blue-200"
                              : "border-slate-300 bg-slate-100 text-slate-700 hover:bg-slate-200"
                          ].join(" ")}
                        >
                          自動播放：{autoPlay ? "開啟" : "關閉"}
                        </button>
                        <button
                          type="button"
                          onClick={() => toggleFavorite(activeCurrent.id)}
                          className={[
                            "min-h-[44px] rounded-lg border px-3 py-2 text-sm font-semibold transition",
                            favorites.includes(activeCurrent.id)
                              ? "border-amber-400 bg-amber-100 text-amber-800 hover:bg-amber-200"
                              : "border-slate-300 bg-white text-slate-700 hover:bg-slate-100"
                          ].join(" ")}
                        >
                          {favorites.includes(activeCurrent.id) ? "⭐ 已收藏" : "☆ 收藏"}
                        </button>
                      </div>

                      <p className="mt-4 text-center text-xs text-slate-500 sm:text-sm">請聽發音並填入平假名</p>
                      <div className="mt-2 text-center text-3xl font-bold tracking-wide sm:text-5xl">
                        {activeCurrent.chinese}
                      </div>

                      <div className={["mx-auto mt-4 flex flex-wrap justify-center gap-2", activeState.shake ? "animate-shake" : ""].join(" ")}>
                        {activeAnswerChars.map((_, idx) => {
                          const isWrong = activeState.wrongIndexes.includes(idx);
                          const isCurrent = activeFirstEmpty === idx;
                          const isHint = activeState.hintIndexes.includes(idx);
                          return (
                            <div
                              key={idx}
                              className={[
                                "h-14 w-12 rounded-lg border-2 bg-white text-center text-2xl leading-[3.2rem] transition sm:h-16 sm:w-14 sm:text-3xl",
                                isWrong
                                  ? "border-rose-500 bg-rose-50"
                                  : activeState.showResultOverlay
                                  ? "border-emerald-500"
                                  : isCurrent && !activeState.gaveUp
                                  ? "border-blue-500 ring-2 ring-blue-100"
                                  : activeState.gaveUp
                                  ? "border-emerald-400 bg-emerald-50"
                                  : "border-slate-300",
                                isHint ? "animate-pulseHint border-violet-400 bg-violet-50" : ""
                              ].join(" ")}
                            >
                              {activeState.inputChars[idx] || (isHint ? activeAnswerChars[idx] : "")}
                            </div>
                          );
                        })}
                      </div>

                      {activeState.gaveUp ? (
                        <div className="mt-4 flex justify-center animate-fadeInUp">
                          <button
                            type="button"
                            onClick={() => gotoNextQuestionOrFinish(activePracticeMode)}
                            className="min-h-[44px] w-full max-w-[200px] rounded-lg border border-emerald-400 bg-emerald-100 px-4 py-2 text-lg font-bold text-emerald-900 shadow hover:bg-emerald-200 active:scale-95 transition"
                          >
                            下一題 ➔
                          </button>
                        </div>
                      ) : (
                        <div className="mt-4 flex flex-wrap justify-center gap-2">
                          <button
                            type="button"
                            onClick={backspace}
                            className="min-h-[44px] rounded-lg bg-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-300 active:scale-[0.98]"
                          >
                            退格 (Backspace)
                          </button>
                          <button
                            type="button"
                            onClick={clearAll}
                            className="min-h-[44px] rounded-lg bg-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-300 active:scale-[0.98]"
                          >
                            清空 (Clear)
                          </button>
                        </div>
                      )}

                      <p
                        className={[
                          "mt-3 min-h-6 text-center text-sm font-bold",
                          activeState.statusText === "答對！"
                            ? "text-emerald-600"
                            : activeState.statusText.includes("完成") || activeState.statusText.includes("放棄")
                            ? "text-blue-600"
                            : activeState.statusText
                            ? "text-rose-600"
                            : "text-slate-400"
                        ].join(" ")}
                      >
                        {activeState.statusText || " "}
                      </p>

                      {activeState.showRemoveMistakePrompt && (
                        <div className="mt-2 rounded-lg border border-amber-300 bg-amber-50 p-3 text-sm text-amber-900 animate-fadeInUp">
                          <p className="mb-2 font-semibold">是否將此題移出錯題本？</p>
                          <button
                            type="button"
                            onClick={() => removeFromMistakeBook(activeCurrent.id)}
                            className="min-h-[44px] rounded-lg border border-amber-400 bg-amber-100 px-3 py-2 font-semibold hover:bg-amber-200"
                          >
                            是，移出錯題本
                          </button>
                        </div>
                      )}
                    </>
                  )}
                </section>

                <section className="rounded-2xl border border-slate-200 bg-white p-3 shadow-sm sm:p-4">
                  <div className="mb-3 grid grid-cols-3 gap-2">
                    {KEYBOARD_TABS.map((tab) => (
                      <button
                        key={tab.id}
                        type="button"
                        onClick={() => setKeyboardMode(tab.id)}
                        className={[
                          "min-h-[44px] rounded-lg border px-2 py-2 text-sm font-semibold transition",
                          keyboardMode === tab.id
                            ? tab.id === "special"
                              ? "border-cyan-400 bg-cyan-100 text-cyan-900"
                              : "border-blue-400 bg-blue-100 text-blue-900"
                            : "border-slate-300 bg-slate-100 text-slate-700 hover:bg-slate-200"
                        ].join(" ")}
                      >
                        {tab.label}
                      </button>
                    ))}
                  </div>
                  <div className="mb-3 flex flex-wrap gap-2 text-xs font-semibold">
                    <span className="rounded-full bg-slate-200 px-3 py-1 text-slate-700">清音</span>
                    <span className="rounded-full bg-slate-200 px-3 py-1 text-slate-700">濁音/半濁音</span>
                    <span className="rounded-full bg-cyan-100 px-3 py-1 text-cyan-900">特殊音：ゃ、ゅ、ょ、っ、ー、う、い</span>
                  </div>
                  {renderKeyboardPanel()}
                </section>
              </div>
            </div>

            {activePracticeMode && activeState && activeState.showResultOverlay && activeCurrent && (
              <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/45 px-4">
                <div className="w-full max-w-sm animate-pop rounded-2xl border-2 border-emerald-400 bg-white p-6 text-center shadow-xl">
                  <div className="text-6xl text-emerald-500">✓</div>
                  <p className="mt-2 text-sm font-semibold text-emerald-700">答對了！</p>
                  <p className="mt-3 text-3xl font-bold text-slate-800">{activeCurrent.kanji}</p>
                  <p className="mt-1 text-xl text-slate-600">{activeCurrent.kana}</p>
                </div>
              </div>
            )}

            {toast.visible && (
              <div className="fixed bottom-4 left-1/2 z-50 w-[92vw] max-w-sm -translate-x-1/2 animate-fadeInUp rounded-lg border border-slate-300 bg-slate-900 px-4 py-3 text-center text-sm font-semibold text-white shadow-lg">
                {toast.text}
              </div>
            )}

            {settingsOpen && (
              <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/45 p-4">
                <div className="w-full max-w-lg rounded-2xl border border-slate-200 bg-white p-4 shadow-xl sm:p-5">
                  <div className="mb-2 flex items-center justify-between gap-2">
                    <h3 className="text-base font-bold sm:text-lg">進度設定</h3>
                    <button
                      type="button"
                      onClick={() => setSettingsOpen(false)}
                      className="min-h-[40px] min-w-[40px] rounded-lg border border-slate-300 bg-slate-100 text-lg hover:bg-slate-200"
                    >
                      ✕
                    </button>
                  </div>
                  <p className="text-xs text-slate-500 sm:text-sm">
                    在這裡備份/匯入 `mistakes` 與 `favorites`，以及清空所有紀錄。
                  </p>
                  <div className="mt-3 flex flex-wrap gap-2">
                    <button
                      type="button"
                      onClick={refreshExportString}
                      className="min-h-[44px] rounded-lg border border-blue-300 bg-blue-100 px-3 py-2 text-sm font-semibold text-blue-900 hover:bg-blue-200"
                    >
                      產生備份字串
                    </button>
                    <button
                      type="button"
                      onClick={importProgress}
                      className="min-h-[44px] rounded-lg border border-emerald-300 bg-emerald-100 px-3 py-2 text-sm font-semibold text-emerald-900 hover:bg-emerald-200"
                    >
                      貼上後匯入
                    </button>
                    <button
                      type="button"
                      onClick={clearAllRecords}
                      className="min-h-[44px] rounded-lg border border-rose-300 bg-rose-100 px-3 py-2 text-sm font-semibold text-rose-900 hover:bg-rose-200"
                    >
                      清空所有紀錄
                    </button>
                  </div>
                  <label className="mt-3 block text-xs font-semibold text-slate-600">備份字串（可複製）</label>
                  <textarea
                    value={exportText}
                    readOnly
                    className="mt-1 min-h-[84px] w-full rounded-lg border border-slate-200 bg-slate-50 p-3 text-xs text-slate-600 sm:text-sm"
                  />
                  <label className="mt-3 block text-xs font-semibold text-slate-600">匯入內容（貼上 Base64 或 JSON）</label>
                  <textarea
                    value={transferText}
                    onChange={(e) => setTransferText(e.target.value)}
                    placeholder="貼上要匯入的備份字串"
                    className="mt-1 min-h-[110px] w-full rounded-lg border border-slate-300 p-3 text-xs text-slate-700 outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100 sm:text-sm"
                  />
                  {settingsMessage && <p className="mt-2 text-sm font-semibold text-slate-700">{settingsMessage}</p>}
                </div>
              </div>
            )}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
